  method: GET
  endpoint: /api/show-format?show_id=hootline
  assertions:
    - status: 200
    - json_path: segments
      operator: exists

- id: all-dashboard-endpoints-reachable-coverage
  feature: dashboard
  type: must_never_happen
  incident: INC-004
  description: >
    Coverage dashboard endpoint is reachable (not 404).
  method: GET
  endpoint: /api/coverage-dashboard?show_id=hootline
  assertions:
    - status: 200

- id: all-dashboard-endpoints-reachable-history
  feature: dashboard
  type: must_never_happen
  incident: INC-004
  description: >
    History endpoint is reachable (not 404).
  method: GET
  endpoint: /api/history?show_id=hootline
  assertions:
    - status: 200
    - json_path: rows
      operator: exists

- id: all-dashboard-endpoints-reachable-learning
  feature: dashboard
  type: must_never_happen
  incident: INC-004
  description: >
    Learning episodes endpoint is reachable (not 404).
  method: GET
  endpoint: /api/learning/episodes?show_id=hootline
  assertions:
    - status: 200
    - json_path: dates
