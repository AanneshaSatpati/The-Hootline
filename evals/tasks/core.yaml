- id: all-dashboard-endpoints-reachable-prompts
  feature: dashboard
  type: must_never_happen
  incident: INC-004
  description: >
    Prompt config endpoint is reachable (not 404).
  method: GET
  endpoint: /api/prompt-config?show_id=hootline
  assertions:
    - status: 200

- id: all-dashboard-endpoints-reachable-health
  feature: dashboard
  type: must_never_happen
  incident: INC-004
  description: >
    Health endpoint is reachable (not 404).
  method: GET
  endpoint: /health
  assertions:
    - status: 200
    - json_path: status
      operator: eq
      value: ok

# INC-005: Dashboard must not get stuck on "Loading..."
- id: dashboard-not-stuck-loading
  feature: dashboard
  type: regression
  incident: INC-005
  description: >
    The dashboard HTML must contain a .catch() handler on the init promise
    chain so that loadLatest() runs even if loadShowFormat() fails. Also
    verifies the safety-net setTimeout is present. Without these, a transient
    network error silently leaves every tab stuck on "Loading..." forever.
  method: GET
  endpoint: /
  assertions:
    - status: 200
    - body_contains: ".catch("
    - body_contains: "forcing loadLatest"
    - body_contains: "unhandledrejection"

# INC-005: No double-escaped apostrophes in plain JS string assignments
- id: dashboard-js-no-syntax-errors
  feature: dashboard
  type: must_never_happen
  incident: INC-005
  description: >
    The dashboard must not contain double-escaped apostrophes in plain JS
    variable assignments (const/let/var). Patterns like "const x = 'Here\\'s'"
    are syntax errors that kill ALL JS execution. The \\ becomes a literal
    backslash, then ' ends the string, then 's is unexpected. This test
    checks that the init promise chain contains .catch() (proving the JS
    block parsed successfully — if any syntax error existed, nothing would
    be defined).
  method: GET
  endpoint: /
  assertions:
    - status: 200
    - body_contains: "loadShowFormat().then"
    - body_contains: ".catch("

# INC-006: Served HTML must never contain double-escaped apostrophes
- id: dashboard-no-double-escaped-quotes
  feature: dashboard
  type: must_never_happen
  incident: INC-006
  description: >
    The served dashboard HTML must not contain the 3-character sequence
    backslash-backslash-apostrophe (\\'). In JS, \\ is a literal backslash
    and then ' ends the string — always a syntax error. This pattern has
    caused the dashboard to silently break twice (INC-005, INC-006) because
    a single syntax error kills the entire script block. This eval directly
    detects the bad pattern rather than relying on indirect proxy checks.
  method: GET
  endpoint: /
  assertions:
    - status: 200
    - body_contains: "\\\\'"
      operator: not_contains

# INC-007: Dashboard must not crash when _show_states is empty
- id: dashboard-startup-no-crash
  feature: dashboard
  type: must_never_happen
  incident: INC-007
  description: >
    The root dashboard endpoint must never return 500. When the server is
    fully started, it returns 200 with the dashboard HTML. This eval verifies
    the endpoint is reachable and serves content (not a 500 crash from
    StopIteration when _show_states is empty).
  method: GET
  endpoint: /
  assertions:
    - status: 200
    - body_contains: "Internal Server Error"
      operator: not_contains

# INC-006: Template must be read fresh (not cached at import time)
- id: dashboard-template-not-stale
  feature: dashboard
  type: regression
  incident: INC-006
  description: >
    The dashboard router must not cache the template at module import time.
    This eval verifies that the served HTML includes the current build
    version (which is set at import time) AND the .catch() error handler
    (which was added to the template). If the template were stale-cached
    from before the fix, the .catch() would be missing.
  method: GET
  endpoint: /
  assertions:
    - status: 200
    - body_contains: "__BUILD_VERSION__"
      operator: not_contains
    - body_contains: ".catch("
    - body_contains: "loadShowFormat().then"
